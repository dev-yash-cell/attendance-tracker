<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --default-bg: url('https://replicate.delivery/xpbkg/O5xI8Qd90iXoK5I7Y9U3N5E9G1H5L1F1V1J1K2M1Q1U1W1S1/lucky_star.png'); }
        body { font-family: 'Inter', sans-serif; background-color: #000; background-image: var(--default-bg); background-size: cover; background-position: center; background-attachment: fixed; color: white; margin: 0; padding: 0; overflow: hidden; touch-action: pan-y; }
        
        #app-slider { display: flex; width: 500vw; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); height: 100vh; }
        .page { width: 100vw; height: 100vh; overflow-y: auto; padding: 20px; padding-top: 140px; -webkit-overflow-scrolling: touch; }

        .header-fixed { position: fixed; top: 0; left: 0; right: 0; z-index: 500; background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 70%, transparent 100%); padding: 20px; touch-action: pan-x; }
        .nav-indicator { display: flex; gap: 6px; justify-content: center; margin-top: 15px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .dot.active { background: white; width: 20px; border-radius: 4px; }

        .subject-strip { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 15px; border-radius: 1.25rem; overflow: hidden; }

        /* Syllabus Drawing Area */
        #canvas-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1.3; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); border-radius: 1.5rem; overflow: hidden; touch-action: none; }
        #syllabus-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 20px; border-radius: 30px; font-size: 11px; font-weight: 900; z-index: 2000; display: none; }
    </style>
</head>
<body>

    <div id="toast">Message</div>

    <!-- Modal for Links -->
    <div id="link-modal" class="modal-overlay">
        <div class="bg-zinc-900 border border-white/10 p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase">New Link</h2>
            <input type="text" id="modal-link-name" placeholder="Name" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-4 text-white outline-none">
            <input type="text" id="modal-link-url" placeholder="URL" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-4 text-white outline-none">
            <div class="flex gap-3">
                <button onclick="closeLinkModal()" class="flex-1 py-3 rounded-xl border border-white/10 text-xs font-bold uppercase opacity-40">Cancel</button>
                <button onclick="confirmAddLink()" class="flex-1 py-3 rounded-xl bg-white text-black text-xs font-bold uppercase">Save</button>
            </div>
        </div>
    </div>

    <!-- Navigation Header -->
    <header class="header-fixed" id="nav-header">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 id="page-title" class="text-2xl font-black tracking-tighter uppercase opacity-90">Attendance</h1>
            <button onclick="document.getElementById('bg-up').click()" class="text-[10px] font-bold uppercase border border-white/20 px-3 py-2 rounded-full">Wallpaper</button>
        </div>
        <div class="nav-indicator">
            <div id="dot-0" class="dot active"></div><div id="dot-1" class="dot"></div><div id="dot-2" class="dot"></div><div id="dot-3" class="dot"></div><div id="dot-4" class="dot"></div>
        </div>
        <input type="file" id="bg-up" accept="image/*" class="hidden" onchange="handleMainBg(this)">
    </header>

    <div id="app-slider">
        <div class="page" id="page-0">
            <div class="max-w-4xl mx-auto" id="att-list"></div>
            <!-- Backup Section -->
            <div class="max-w-4xl mx-auto mt-8 mb-24 p-6 border border-white/5 rounded-3xl bg-white/5 text-center">
                <p class="text-[9px] font-bold uppercase opacity-20 mb-4 tracking-[0.2em]">Data Management</p>
                <div class="flex gap-3">
                    <button onclick="exportData()" class="flex-1 py-3 bg-white/10 rounded-xl text-[9px] font-bold uppercase tracking-widest">Export</button>
                    <button onclick="document.getElementById('import-in').click()" class="flex-1 py-3 bg-white/10 rounded-xl text-[9px] font-bold uppercase tracking-widest">Import</button>
                </div>
                <input type="file" id="import-in" accept=".json" class="hidden" onchange="importData(this)">
            </div>
        </div>
        <div class="page" id="page-1"><div class="max-w-4xl mx-auto" id="timer-list"></div></div>
        <div class="page" id="page-2"><div class="max-w-4xl mx-auto" id="total-list"></div></div>
        <div class="page" id="page-3"><div class="max-w-4xl mx-auto" id="res-list"></div></div>
        <div class="page" id="page-4">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-4">
                    <select id="syll-sel" onchange="curSyllSub = parseInt(this.value); loadSyll();" class="bg-white/10 border-none rounded-full px-4 py-2 text-[10px] font-bold uppercase text-white outline-none"></select>
                    <button onclick="document.getElementById('s-up').click()" class="text-[10px] font-bold uppercase text-emerald-400">Upload Syll</button>
                    <input type="file" id="s-up" accept="image/*" class="hidden" onchange="handleSyllImg(this)">
                </div>
                <div id="canvas-wrap"><canvas id="syllabus-canvas"></canvas></div>
                <div class="flex justify-center gap-6 mt-6 pb-32">
                    <button onclick="setTool('pen')" id="tool-pen" class="p-4 bg-white/10 rounded-full border border-white/20 text-red-500 font-bold">PEN</button>
                    <button onclick="setTool('eraser')" id="tool-eraser" class="p-4 bg-white/10 rounded-full border border-white/20 opacity-40 font-bold">ERASER</button>
                    <button onclick="saveSyll()" class="px-8 py-3 bg-emerald-500/20 text-emerald-400 rounded-full text-[10px] font-bold uppercase">Save Drawing</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE (IndexedDB) ---
        let db;
        let subjects = [
            { id: 1, name: 'Subject 1', attended: 0, total: 0, daySec: 0, totSec: 0, target: 75, links: [], syllabus: null },
            { id: 2, name: 'Subject 2', attended: 0, total: 0, daySec: 0, totSec: 0, target: 75, links: [], syllabus: null },
            { id: 3, name: 'Subject 3', attended: 0, total: 0, daySec: 0, totSec: 0, target: 75, links: [], syllabus: null },
            { id: 4, name: 'Subject 4', attended: 0, total: 0, daySec: 0, totSec: 0, target: 75, links: [], syllabus: null },
            { id: 5, name: 'Subject 5', attended: 0, total: 0, daySec: 0, totSec: 0, target: 75, links: [], syllabus: null },
            { id: 6, name: 'Subject 6', attended: 0, total: 0, daySec: 0, totSec: 0, target: 75, links: [], syllabus: null }
        ];

        const dbReq = indexedDB.open("AttendanceTrackerFinal", 1);
        dbReq.onupgradeneeded = e => { e.target.result.createObjectStore("store", { keyPath: "id" }); };
        dbReq.onsuccess = e => { db = e.target.result; loadDB(); };
        dbReq.onerror = () => render(); // Emergency fallback

        function loadDB() {
            db.transaction("store").objectStore("store").get("data").onsuccess = e => {
                if (e.target.result) { subjects = e.target.result.val; checkDailyReset(); }
                render();
            };
            const wall = localStorage.getItem('main_bg');
            if (wall) document.body.style.backgroundImage = `url(${wall})`;
        }

        function saveDB() {
            if (!db) return;
            db.transaction("store", "readwrite").objectStore("store").put({ id: "data", val: subjects });
            render();
        }

        // --- NAVIGATION ---
        let pageIdx = 0, tX = 0, tY = 0, activeId = null, timerInt = null;
        function setPage(i) {
            pageIdx = i;
            document.getElementById('app-slider').style.transform = `translateX(-${i * 100}vw)`;
            [0,1,2,3,4].forEach(d => document.getElementById(`dot-${d}`).classList.toggle('active', d === i));
            const titles = ['Attendance', 'Study Timer', 'Total Progress', 'Resources', 'Syllabus'];
            document.getElementById('page-title').innerText = titles[i];
            if (i === 4) setTimeout(initCanvas, 150);
        }

        window.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            const dX = tX - e.changedTouches[0].clientX;
            const dY = tY - e.changedTouches[0].clientY;
            if (Math.abs(dX) > 80 && Math.abs(dX) > Math.abs(dY)) {
                if (dX > 0 && pageIdx < 4) setPage(pageIdx + 1);
                else if (dX < 0 && pageIdx > 0) setPage(pageIdx - 1);
            }
        });

        // --- SYLLABUS CANVAS ---
        let cv, cx, draws = false, tool = 'pen', curSyllSub = 1;
        function initCanvas() {
            cv = document.getElementById('syllabus-canvas'); cx = cv.getContext('2d');
            const w = document.getElementById('canvas-wrap');
            cv.width = w.clientWidth; cv.height = w.clientHeight;
            cv.addEventListener('touchstart', e => { e.preventDefault(); draws=true; cx.beginPath(); const r=cv.getBoundingClientRect(); cx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); });
            cv.addEventListener('touchmove', e => { if(!draws) return; e.preventDefault(); const r=cv.getBoundingClientRect(); cx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); cx.lineWidth=3; cx.strokeStyle=tool==='pen'?'#ff3b3b':'rgba(0,0,0,1)'; cx.globalCompositeOperation=tool==='pen'?'source-over':'destination-out'; cx.stroke(); });
            cv.addEventListener('touchend', () => draws = false);
            loadSyll();
        }
        function loadSyll(){
            const s=subjects.find(x=>x.id===curSyllSub); cx.clearRect(0,0,cv.width,cv.height);
            if(s.syllabus){ const i=new Image(); i.onload=()=>cx.drawImage(i,0,0,cv.width,cv.height); i.src=s.syllabus; }
        }
        function handleSyllImg(i){
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas'); c.width=800; c.height=img.height*(800/img.width);
                    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                    subjects.find(x=>x.id===curSyllSub).syllabus=c.toDataURL('image/jpeg',0.6);
                    saveDB(); loadSyll();
                }; img.src = e.target.result;
            }; reader.readAsDataURL(i.files[0]);
        }
        function saveSyll(){ subjects.find(x=>x.id===curSyllSub).syllabus=cv.toDataURL('image/jpeg',0.5); saveDB(); showToast("Work Saved"); }
        function setTool(t){ tool=t; document.getElementById('tool-pen').style.opacity=t==='pen'?'1':'0.4'; document.getElementById('tool-eraser').style.opacity=t==='eraser'?'1':'0.4'; }

        // --- BACKUP ---
        function exportData(){
            const blob = new Blob([JSON.stringify({subjects})], {type:"application/json"});
            const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="study_backup.json"; a.click();
        }
        function importData(i){
            const r = new FileReader();
            r.onload = e => { subjects = JSON.parse(e.target.result).subjects; saveDB(); location.reload(); };
            r.readAsText(i.files[0]);
        }

        // --- HELPERS ---
        function showToast(m){ const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
        function fmt(s){ return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':'); }
        function handleMainBg(i){ const r=new FileReader(); r.onload=e=>{ document.body.style.backgroundImage=`url(${e.target.result})`; localStorage.setItem('main_bg',e.target.result); }; r.readAsDataURL(i.files[0]); }
        function checkDailyReset() { const today = new Date().toDateString(); if (localStorage.getItem('last_day') !== today) { subjects.forEach(s => s.daySec = 0); localStorage.setItem('last_day', today); saveDB(); } }

        function render() {
            document.getElementById('syll-sel').innerHTML = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            document.getElementById('att-list').innerHTML = subjects.map(s => {
                const p = s.total === 0 ? 0 : Math.round((s.attended / s.total) * 100);
                const strat = s.total === 0 ? "Empty" : ( (s.attended/s.total)*100 >= s.target ? `Skip: ${Math.floor((s.attended*100/s.target)-s.total)}` : `Attend: ${Math.ceil((s.target*s.total-100*s.attended)/(100-s.target))}` );
                return `<div class="subject-strip p-4"><div class="flex justify-between mb-2"><div class="flex-1"><input type="text" value="${s.name}" onchange="subjects.find(x=>x.id===${s.id}).name=this.value; saveDB();" class="bg-transparent font-black outline-none text-sm w-full"><div class="text-[9px] opacity-30 mt-1">${s.attended}/${s.total} classes</div></div><div class="text-right"><div class="text-2xl font-black ${p<s.target?'text-red-500':'text-emerald-400'}">${p}%</div><div class="flex gap-1 items-center"><span class="text-[8px] opacity-20">GOAL</span><input type="number" value="${s.target}" onchange="subjects.find(x=>x.id===${s.id}).target=parseInt(this.value); saveDB();" class="bg-white/10 w-8 text-[10px] text-center rounded"></div></div></div><div class="flex justify-between items-center"><div class="text-[9px] font-black uppercase ${p<s.target?'text-red-400':'text-emerald-400'}">${strat}</div><div class="flex gap-6"><button onclick="subjects.find(x=>x.id===${s.id}).attended++; subjects.find(x=>x.id===${s.id}).total++; saveDB();" class="text-3xl font-light">+</button><button onclick="subjects.find(x=>x.id===${s.id}).total++; saveDB();" class="text-3xl font-light">-</button></div></div></div>`;
            }).join('');
            document.getElementById('timer-list').innerHTML = subjects.map(s => `<div class="subject-strip p-5 flex justify-between"><div><div class="text-xs font-bold opacity-50 mb-1">${s.name}</div><div class="timer-display" id="time-d-${s.id}">${fmt(s.daySec)}</div></div><button onclick="toggleT(${s.id})" class="action-btn w-12 h-12">${activeId===s.id?'PAUSE':'PLAY'}</button></div>`).join('');
            document.getElementById('total-list').innerHTML = subjects.map(s => `<div class="subject-strip p-5 flex justify-between"><div><div class="text-[9px] opacity-30 uppercase">Lifetime</div><div class="text-sm font-bold opacity-80">${s.name}</div></div><div class="timer-display text-emerald-400 font-bold">${fmt(s.totSec)}</div></div>`).join('');
            document.getElementById('res-list').innerHTML = subjects.map(s => `<div class="subject-strip p-5"><div class="flex justify-between items-center mb-4"><div class="text-sm font-bold">${s.name}</div><button onclick="tSId=${s.id};document.getElementById('link-modal').style.display='flex'" class="text-emerald-400 text-[10px] font-bold">+ LINK</button></div><div class="grid gap-2">${s.links.map((l,i)=>`<div class="bg-white/5 p-3 rounded-xl flex justify-between" onclick="window.open(l.url.includes('http')?l.url:'https://'+l.url)"><div class="truncate text-xs font-bold">${l.name}</div><button onclick="event.stopPropagation(); subjects.find(x=>x.id===${s.id}).links.splice(${i},1); saveDB();">X</button></div>`).join('')}</div></div>`).join('');
        }

        let tSId = null; function closeLinkModal(){ document.getElementById('link-modal').style.display='none'; }
        function confirmAddLink(){ const n=document.getElementById('modal-link-name').value, u=document.getElementById('modal-link-url').value; if(n&&u){ subjects.find(x=>x.id===tSId).links.push({name:n,url:u}); saveDB(); closeLinkModal(); } }
        function toggleT(id){ activeId=(activeId===id)?null:id; if(activeId && !timerInt) timerInt=setInterval(()=>{ if(activeId){ const s=subjects.find(x=>x.id===activeId); s.daySec++; s.totSec++; const d=document.getElementById(`time-d-${activeId}`); if(d) d.innerText=fmt(s.daySec); } },1000); render(); }
        
        render(); 
    </script>
</body>
</html>
